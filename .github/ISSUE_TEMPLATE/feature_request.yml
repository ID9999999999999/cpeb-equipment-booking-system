name: Feature request
description: Suggest a clear, scoped improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: Need
      description: What user or project need does this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed solution.
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Limitations and risks
      description: Mention constraints, risks, or open questions.
    validations:
      required: false
