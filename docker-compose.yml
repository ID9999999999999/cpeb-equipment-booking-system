services:
  db:
    image: postgres:16
    container_name: cpeb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cpeb_dev}
    ports:
      - "5432:5432"
    volumes:
      - cpeb_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: cpeb_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/cpeb_dev?schema=public}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_local_development_secret}
      PORT: ${PORT:-3000}
    ports:
      - "3000:3000"

volumes:
  cpeb_pgdata:
